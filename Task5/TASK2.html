<!DOCTYPE html>
<html>
<body>

<script>

// Function Expression to get string length
let getLength = function(str){
    return str.length;
};

// Arrow Function to get square of a number
let squareNumber = (num) => {
    return num * num;
};

// Call functions
let lengthResult = getLength("JavaScript");
let squareResult = squareNumber(5);

// Display results
console.log("String Length:", lengthResult);
console.log("Square of Number:", squareResult);

</script>

</body>
</html>
